<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forest O&M Financial - Set Password</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #0d2830; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 10px; padding: 40px; width: 380px; max-width: 94vw; box-shadow: 0 12px 40px rgba(0,0,0,0.35); border-top: 5px solid #114d5d; }
.logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.logo { width: 40px; height: 40px; border-radius: 6px; background: #114d5d; }
.brand { font-weight: 700; font-size: 15px; color: #114d5d; line-height: 1.3; }
.brand small { display: block; font-weight: 400; font-size: 11px; color: #8ca6ae; text-transform: uppercase; letter-spacing: 0.4px; }
h2 { margin: 0 0 6px; color: #114d5d; font-size: 18px; font-weight: 700; }
.sub { font-size: 13px; color: #8ca6ae; margin-bottom: 20px; }
label { display: block; font-size: 11px; font-weight: 700; color: #46717e; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.3px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #dde4e6; border-radius: 6px; font-size: 14px; font-family: inherit; color: #0d2830; }
input:focus { outline: none; border-color: #114d5d; box-shadow: 0 0 0 2px rgba(17,77,93,0.15); }
button { width: 100%; margin-top: 20px; padding: 12px; background: #114d5d; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
button:hover { background: #46717e; }
.msg { margin-top: 12px; padding: 10px 12px; border-radius: 6px; font-size: 13px; display: none; }
.msg.error { background: #fdeaea; color: #a01818; }
.msg.success { background: #e0f9f4; color: #0a4a3d; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo"></div>
    <div class="brand">FOREST O&M FINANCIAL <small>Maintenance Dashboard</small></div>
  </div>
  <h2>Set your password</h2>
  <p class="sub">Choose a password to activate your account.</p>
  <label for="password">New password</label>
  <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
  <label for="confirm">Confirm password</label>
  <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
  <button id="btnSet">Activate account</button>
  <div class="msg" id="msg"></div>
</div>
<script>
const TOKEN_KEY = 'fe_om_token';
const params = new URLSearchParams(window.location.search);
const inviteToken = params.get('token');

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

if (!inviteToken) showMsg('Invalid or missing invite link.', 'error');

document.getElementById('btnSet').addEventListener('click', async () => {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
  if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
  try {
    const res = await fetch('/api/auth/set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: inviteToken, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || 'Failed to set password.', 'error'); return; }
    localStorage.setItem(TOKEN_KEY, data.token);
    showMsg('Password set. Redirecting...', 'success');
    setTimeout(() => window.location.href = '/', 1200);
  } catch(e) {
    showMsg('Network error. Please try again.', 'error');
  }
});
</script>
</body>
</html>
